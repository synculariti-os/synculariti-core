  todo-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Collect TODOs
        run: node scripts/collect-todos.ts
      - name: Enforce TODO limit
        run: |
          COUNT=$(jq length todos.json)
          echo "Found $COUNT TODOs"
          if [ $COUNT -gt 200 ]; then
            echo "❌ Too many TODOs ($COUNT) – reduce technical debt before merging"
            exit 1
          fi
